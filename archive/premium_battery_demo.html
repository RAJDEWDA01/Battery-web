<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Premium 3D Battery Demo</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #f7f7f7, #ececec);
      font-family: Arial, sans-serif;
    }
    .product-card {
      width: min(1000px, 94vw);
      background: #fff;
      border-radius: 28px;
      padding: 28px;
      box-shadow: 0 28px 80px rgba(0,0,0,.14);
    }
    model-viewer {
      width: 100%;
      height: 620px;
      border-radius: 22px;
      background: radial-gradient(circle at center, #ffffff 0%, #eeeeee 70%);
    }
  </style>
</head>
<body>
  <div class="product-card">
    <model-viewer
      src="./premium_two_wheeler_battery.glb"
      alt="Premium 3D Two Wheeler Battery"
      auto-rotate
      camera-controls
      shadow-intensity="1"
      exposure="1.1"
      ar>
    </model-viewer>
  </div>
</body>
</html>
